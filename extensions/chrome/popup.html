<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e5e7eb;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1f2937;
    }
    .header svg { width: 20px; height: 20px; color: #818cf8; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .input-group { margin-bottom: 12px; }
    .input-group label {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    textarea, input[type="text"] {
      width: 100%;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px;
      color: #e5e7eb;
      font-size: 13px;
      resize: vertical;
    }
    textarea { min-height: 80px; }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: #6366f1;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-secondary { background: #1f2937; color: #d1d5db; }
    .btn-secondary:hover:not(:disabled) { background: #374151; }
    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 20px;
    }
    .status.success { color: #34d399; }
    .status.error { color: #f87171; }
    .settings-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      color: #6b7280;
      text-decoration: none;
      cursor: pointer;
    }
    .settings-link:hover { color: #9ca3af; }
    .settings-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1f2937;
    }
    .settings-panel.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2a8 8 0 0 0-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 0 0-8-8z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <h1>Mimir Capture</h1>
  </div>

  <div class="input-group">
    <label>Content</label>
    <textarea id="content" placeholder="Type or paste anything..."></textarea>
  </div>

  <div class="actions">
    <button class="btn-primary" id="captureBtn">Capture Note</button>
    <button class="btn-secondary" id="savePageBtn">Save Page</button>
  </div>

  <div class="status" id="status"></div>

  <a class="settings-link" id="settingsToggle">Settings</a>

  <div class="settings-panel" id="settingsPanel">
    <div class="input-group">
      <label>Mimir Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://192.168.1.100:3080">
    </div>
    <div class="input-group">
      <label>API Key (optional)</label>
      <input type="text" id="apiKey" placeholder="Leave empty if not set">
    </div>
    <button class="btn-secondary" id="saveSettings" style="width:100%">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
