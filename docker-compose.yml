services:
  # Frontend starts first — always serves the UI shell even if backend is booting
  mimir-frontend:
    build: ./frontend
    container_name: mimir-frontend
    restart: unless-stopped
    ports:
      - "3081:80"
    depends_on:
      mimir-backend:
        condition: service_started

  # Backend starts after Ollama is healthy
  mimir-backend:
    build: ./backend
    container_name: mimir-backend
    restart: unless-stopped
    ports:
      - "3080:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_PATH=/data/mimir.db
      - CHROMA_PATH=/data/chroma
      - DOCUMENTS_PATH=/data/documents
      - INBOX_PATH=/data/inbox
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - LLM_MODEL=${LLM_MODEL:-gemma3}
      - BRIEF_TIME=${BRIEF_TIME:-07:00}
      - API_KEY=${API_KEY:-}
      - HARNESS_PRESET=${HARNESS_PRESET:-local}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID:-}
      - MATTERMOST_URL=${MATTERMOST_URL:-}
      - MATTERMOST_BOT_TOKEN=${MATTERMOST_BOT_TOKEN:-}
      - MATTERMOST_CHANNEL_ID=${MATTERMOST_CHANNEL_ID:-}
      - BRIDGE_WEBHOOK_BASE_URL=${BRIDGE_WEBHOOK_BASE_URL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_RECIPIENT=${SMTP_RECIPIENT:-}
      - DIGEST_DAY=${DIGEST_DAY:-monday}
      - DIGEST_HOUR=${DIGEST_HOUR:-8}
    volumes:
      - ${DATA_PATH:-./data}:/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: mimir-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ${OLLAMA_MODELS_PATH:-./ollama-models}:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Uncomment for GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
